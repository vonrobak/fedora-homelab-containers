@version: 4.5
@include "scl.conf"

# UniFi UDM Pro SIEM syslog receiver.
#
# Source restriction is enforced by firewalld on the host (rich rule: src=192.168.1.1/32).
# Rootless Podman NAT may rewrite source IPs for UDP, so internal netmask() filtering is
# unreliable - the host firewall is the authoritative trust boundary.
#
# Bootstrap policy: accept everything the UDM sends, write to one file. Tune filters after
# observing 24-48h of real event patterns.

options {
  keep_hostname(yes);
  use_dns(no);
  use_fqdn(no);
  chain_hostnames(off);
  flush_lines(0);
  stats(freq(3600));
  # owner/group/perm intentionally omitted: rootless Podman + SELinux :Z relabeling
  # makes cross-userns chown during file creation fail with a misleading ENOENT.
  # Files are created with syslog-ng's default (root:root 0600 inside container =
  # patriark:patriark on host), which is what we want.
};

source s_udm {
  network(
    transport("udp")
    ip("0.0.0.0")
    port(1514)
    so-rcvbuf(1048576)
    log-iw-size(10000)
    log-fetch-limit(1000)
  );
};

# Drop pure-heartbeat noise observed over 5 days (~25% volume reduction):
#   - earlyoom every-minute "mem avail:" reports (~23% of all lines, no signal)
#   - ubios-udapi-server "Process' stime is unknown (not an error)" — message
#     literally tells you it isn't actionable
#   - dnsmasq-dhcp DHCPACK/DHCPREQUEST routine lease churn (high volume, low value;
#     keep DHCPDISCOVER/DHCPRELEASE which can indicate roaming or rogue clients)
# Anything notice+ passes regardless (audit trail intact). Kernel, suricata-rule,
# ips-update, sshd, and authpriv are never dropped — those are SIEM signal.
filter f_drop_noise {
  not (
    program("patriarkatet-udm") and (
      match("earlyoom\\[[0-9]+\\]: mem avail:" value("MESSAGE") type("pcre"))
      or match("stime is unknown \\(not an error\\)" value("MESSAGE") type("pcre"))
      or match("dnsmasq-dhcp\\[[0-9]+\\]: DHCP(ACK|REQUEST)\\(" value("MESSAGE") type("pcre"))
      or match("dnsmasq-dhcp\\[[0-9]+\\]: Updating leases :: " value("MESSAGE") type("pcre"))
      or match("dnsmasq\\[[0-9]+\\]: inotify: " value("MESSAGE") type("pcre"))
      or match("dnsmasq\\[[0-9]+\\]: read /run/dnsmasq.dns.conf.d" value("MESSAGE") type("pcre"))
    )
  );
};

destination d_udm {
  file(
    "/var/log/unifi-syslog/udm.log"
    template("${ISODATE} src=${SOURCEIP} host=${HOST} prog=${PROGRAM} pid=${PID} pri=${PRIORITY} fac=${FACILITY} msg=${MESSAGE}\n")
    template-escape(no)
  );
};

log {
  source(s_udm);
  filter(f_drop_noise);
  destination(d_udm);
};
