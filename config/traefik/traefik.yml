# Traefik Static Configuration v3.2
# Domain: patriark.org

api:
  dashboard: true
  insecure: false

ping:
  entryPoint: "traefik"

log:
  level: INFO

accessLog:
  filePath: "/var/log/traefik/access.log"
  format: json
  fields:
    defaultMode: keep
    names:
      ClientUsername: drop
    headers:
      defaultMode: drop  # Privacy + size reduction
      names:
        User-Agent: keep
        X-Forwarded-For: keep
        X-Real-IP: keep
  filters:
    statusCodes:
      - "400-599"  # Only log errors (reduce volume)

metrics:
  prometheus:
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    entryPoint: traefik
    buckets:
      - 0.1
      - 0.3
      - 1.0
      - 3.0
      - 10.0

entryPoints:
  traefik:
    address: ":8080"

  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"
    transport:
      respondingTimeouts:
        readTimeout: 600s     # 10 minutes - supports large file uploads (videos, photos)
        writeTimeout: 600s    # 10 minutes - supports large file downloads
        idleTimeout: 180s     # 3 minutes - default, keep-alive connections

providers:
  docker:
    endpoint: "unix:///var/run/podman/podman.sock"
    exposedByDefault: false
    network: systemd-reverse_proxy

  file:
    directory: /etc/traefik/dynamic
    watch: true

global:
  sendAnonymousUsage: false
  # Version discovery happens via check-image-updates.sh (ADR-036), not traefik
  # phoning update.traefik.io — keeps the gateway's egress baseline minimal (Tier 4).
  checkNewVersion: false

experimental:
  plugins:
    crowdsec-bouncer-traefik-plugin:
      moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
      version: "v1.4.5"

certificatesResolvers:
  letsencrypt:
    acme:
      email: blyhode@hotmail.com
      storage: /letsencrypt/acme.json
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"
