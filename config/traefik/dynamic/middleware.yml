http:
  middlewares:
    # ═══════════════════════════════════════════════════════════
    # CROWDSEC BOUNCER - Enhanced Configuration
    # ═══════════════════════════════════════════════════════════
    crowdsec-bouncer:
      plugin:
        crowdsec-bouncer-traefik-plugin:
          # Core settings
          enabled: true
          logLevel: INFO
          updateIntervalSeconds: 60  # Cache refresh interval
          defaultDecisionSeconds: 60  # Default ban duration

          # LAPI Connection
          crowdsecMode: live
          crowdsecLapiScheme: http
          crowdsecLapiHost: crowdsec:8080
          crowdsecLapiKey: "{{ env "CROWDSEC_API_KEY" }}"

          # Forwarded headers (for correct IP detection behind proxies)
          forwardedHeadersCustomName: X-Forwarded-For
          clientTrustedIPs:          # Trust these IPs for X-Forwarded-For
            - 10.89.2.0/24           # reverse_proxy network
            - 10.89.3.0/24           # authentication network
            - 10.89.1.0/24           # media services network
            - 10.89.5.0/24           # monitoring network
            - 192.168.1.0/24         # Local network

          # Ban behavior
          httpTimeoutSeconds: 10
          crowdsecLapiTLSInsecureVerify: false

    # ═══════════════════════════════════════════════════════════
    # RATE LIMITING - Tiered approach
    # ═══════════════════════════════════════════════════════════

    # Standard rate limit (most services)
    rate-limit:
      rateLimit:
        average: 100      # 100 requests
        burst: 50         # Allow bursts of 50
        period: 1m        # Per minute
        sourceCriterion:
          ipStrategy:
            depth: 1      # Use first IP in X-Forwarded-For

    # Very strict rate limit (auth endpoints)
    rate-limit-auth:
      rateLimit:
        average: 10       # Very restrictive for login
        burst: 5
        period: 1m
        sourceCriterion:
          ipStrategy:
            depth: 1

    # Generous rate limit (public APIs)
    rate-limit-public:
      rateLimit:
        average: 200
        burst: 100
        period: 1m
        sourceCriterion:
          ipStrategy:
            depth: 1

    # Vaultwarden authentication rate limit (STRICTEST - password managers are high-value targets)
    rate-limit-vaultwarden-auth:
      rateLimit:
        average: 5        # Very restrictive: 5 attempts/minute
        burst: 2          # Allow minimal burst
        period: 1m
        sourceCriterion:
          ipStrategy:
            depth: 1      # Use first IP in X-Forwarded-For

    # Vaultwarden general (non-auth endpoints)
    rate-limit-vaultwarden:
      rateLimit:
        average: 100      # Normal usage
        burst: 50
        period: 1m
        sourceCriterion:
          ipStrategy:
            depth: 1

    # Nextcloud (per-IP post-ADR-022) — sized for one user's worst-case bulk op.
    # Average steady-state browse rate; burst absorbs PROPFIND tree walks
    # (Music library is ~2080 PROPFINDs, but client parallelism caps the
    # 1-minute window at a few hundred). Tier 2 staged downsize 1500→800
    # (2026-04-28); next step pending 7-day soak with zero 429s.
    rate-limit-nextcloud:
      rateLimit:
        average: 300
        burst: 800
        period: 1m
        sourceCriterion:
          ipStrategy:
            depth: 1

    # qBittorrent (per-IP post-ADR-022, also behind Authelia SSO).
    # Burst covers initial WebUI page load (~500 resources). Average matches
    # WebUI poll cadence (~30-60 req/min) with headroom.
    rate-limit-qbittorrent:
      rateLimit:
        average: 100
        burst: 600
        period: 1m
        sourceCriterion:
          ipStrategy:
            depth: 1

    # Immich (per-IP post-ADR-022) — sized for one device's worst-case op.
    # Burst covers rapid timeline scroll / mobile-app upload burst.
    # Average drops from NAT-era 500 to realistic browsing rate.
    rate-limit-immich:
      rateLimit:
        average: 200
        burst: 1500
        period: 1m
        sourceCriterion:
          ipStrategy:
            depth: 1

    # ═══════════════════════════════════════════════════════════
    # AUTHENTICATION
    # ═══════════════════════════════════════════════════════════

    # Authelia SSO & MFA (YubiKey-First)
    authelia:
      forwardAuth:
        address: "http://authelia:9091/api/verify?rd=https://sso.patriark.org"
        trustForwardHeader: true
        maxResponseBodySize: 4096      # Limit ForwardAuth response (Authelia verify is ~200 bytes)
        authResponseHeaders:
          - "Remote-User"
          - "Remote-Groups"
          - "Remote-Name"
          - "Remote-Email"

    # ═══════════════════════════════════════════════════════════
    # SECURITY HEADERS - Comprehensive
    # ═══════════════════════════════════════════════════════════
    security-headers:
      headers:
        # Basic security
        frameDeny: false  # We'll use customFrameOptionsValue instead
        customFrameOptionsValue: "SAMEORIGIN"
        browserXssFilter: true
        contentTypeNosniff: true

        # HSTS (HTTP Strict Transport Security)
        stsSeconds: 31536000        # 1 year
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true        # Force even on HTTP

        # Content Security Policy (CSP)
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';"

        # Referrer Policy
        referrerPolicy: "strict-origin-when-cross-origin"

        # Permissions Policy (formerly Feature Policy)
        permissionsPolicy: "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"

        # Additional security headers
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "SAMEORIGIN"
          X-XSS-Protection: "1; mode=block"
          X-Robots-Tag: "none"  # Prevent indexing of internal services
          Server: ""            # Hide server header
          X-Powered-By: ""      # Hide powered-by header

    # Strict headers for admin panels
    security-headers-strict:
      headers:
        frameDeny: true  # No iframes at all
        browserXssFilter: true
        contentTypeNosniff: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        contentSecurityPolicy: "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self'; font-src 'self'; connect-src 'self'; frame-ancestors 'none';"
        referrerPolicy: "no-referrer"
        permissionsPolicy: "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow"
          Server: ""

    # Gathio-specific headers (relaxed CSP for required CDNs)
    security-headers-gathio:
      headers:
        frameDeny: false
        customFrameOptionsValue: "SAMEORIGIN"
        browserXssFilter: true
        contentTypeNosniff: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        # Relaxed CSP - Allow CDNs that Gathio requires (jsdelivr, unpkg)
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https:; font-src 'self' data: https://cdn.jsdelivr.net; connect-src 'self'; frame-ancestors 'self';"
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "SAMEORIGIN"
          X-XSS-Protection: "1; mode=block"
          X-Robots-Tag: "none"
          Server: ""
          X-Powered-By: ""

    # Home Assistant - Relaxed CSP for WebSockets and modern web features
    security-headers-ha:
      headers:
        frameDeny: false
        customFrameOptionsValue: "SAMEORIGIN"
        browserXssFilter: true
        contentTypeNosniff: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        # Relaxed CSP - Allow WebSockets, workers, and HA requirements
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss:; worker-src 'self' blob:; child-src 'self' blob:; frame-ancestors 'self';"
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "SAMEORIGIN"
          X-XSS-Protection: "1; mode=block"
          Server: ""
          X-Powered-By: ""

    # Jellyfin - Relaxed CSP for MediaSource API, WebSocket, and web workers
    security-headers-jellyfin:
      headers:
        frameDeny: false
        customFrameOptionsValue: "SAMEORIGIN"
        browserXssFilter: true
        contentTypeNosniff: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' wss:; media-src 'self' blob: data:; worker-src 'self' blob:; frame-src 'self'; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self';"
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "SAMEORIGIN"
          X-XSS-Protection: "1; mode=block"
          Server: ""
          X-Powered-By: ""

    # HSTS-only for Nextcloud (sets own CSP, just needs HSTS + server header stripping)
    hsts-only:
      headers:
        customResponseHeaders:
          Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"
          Server: ""
          X-Powered-By: ""

    # ═══════════════════════════════════════════════════════════
    # PERFORMANCE OPTIMIZATIONS
    # ═══════════════════════════════════════════════════════════
    compression:
      compress:
        excludedContentTypes:
          - text/event-stream  # Don't compress SSE
        minResponseBodyBytes: 1024  # Only compress responses > 1KB

    # Circuit-breaker and retry middlewares were removed 2026-05-15 (issue #146).
    # The homelab converged on no-circuit-breaker / no-retry across all routers
    # after the 2026-02-08 Immich stress test: client ECONNRESET from sync clients
    # inflates NetworkErrorRatio (false trips), and retry cannot replay streamed
    # request bodies. Reintroduce only with a router-specific definition and
    # documented justification.
