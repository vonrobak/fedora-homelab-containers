http:
  routers:
    # Authelia SSO Portal (YubiKey-First Authentication)
    # T1.4 attempted to add a rate-limit on this router on 2026-04-27 to clear
    # SA-TRF-04. Both rate-limit-auth (10/min burst 5) and rate-limit (100/min
    # burst 50) broke the SPA — the portal lazy-loads ~30 chunked components
    # on initial render, which exceeds any per-IP burst sized for human
    # traffic. Brute-force protection lives on authelia-portal-auth below
    # (the actual credential POST endpoints). SA-TRF-04 stays WARN here by
    # design. See 2026-04-27 SSO recovery journal.
    authelia-portal-auth:
      rule: "Host(`sso.patriark.org`) && (PathPrefix(`/api/firstfactor`) || PathPrefix(`/api/secondfactor`) || PathPrefix(`/api/reset-password`) || PathPrefix(`/api/checks/safe-redirection`))"
      service: "authelia"
      entryPoints:
        - websecure
      middlewares:
        - crowdsec-bouncer@file
        - rate-limit-auth@file         # 10/min burst 5 — brute-force protection on credential POSTs
        - hsts-only@file
      tls:
        certResolver: letsencrypt

    authelia-portal:
      rule: "Host(`sso.patriark.org`)"
      service: "authelia"
      entryPoints:
        - websecure
      middlewares:
        - crowdsec-bouncer@file
        - sso-rate-limit@file          # 30/min avg, burst 100 — sized for parallel module loads
        - hsts-only@file               # HSTS + strip server headers (Authelia sets own CSP)
      tls:
        certResolver: letsencrypt

    # Vaultwarden Password Manager (NO Authelia - has own authentication)
    # Split into two routers: strict rate limit on auth endpoints, general on everything else.
    # The Bitwarden extension fetches 20+ favicons simultaneously on open, which triggers
    # the auth-tier rate limit (5/min) and blocks WebSocket/API calls. See 2026-03-12 analysis.
    # Priority order (implicit via rule length — longer rule = higher priority):
    #   1. vaultwarden-auth: /identity/* (login/token exchange)
    #   2. vaultwarden-sensitive: /api/accounts/password, /two-factor (credential mutations)
    #   3. vaultwarden-secure: everything else (icons, WebSocket, general API)
    vaultwarden-auth:
      rule: "Host(`vault.patriark.org`) && PathPrefix(`/identity/`)"
      service: "vaultwarden"
      entryPoints:
        - websecure
      middlewares:
        - crowdsec-bouncer@file
        - rate-limit-vaultwarden-auth@file
        - security-headers@file
      tls:
        certResolver: letsencrypt

    vaultwarden-sensitive:
      rule: "Host(`vault.patriark.org`) && (PathPrefix(`/api/accounts/password`) || PathPrefix(`/api/accounts/two-factor`) || PathPrefix(`/api/accounts/register`))"
      service: "vaultwarden"
      entryPoints:
        - websecure
      middlewares:
        - crowdsec-bouncer@file
        - rate-limit-vaultwarden-auth@file
        - security-headers@file
      tls:
        certResolver: letsencrypt

    vaultwarden-secure:
      rule: "Host(`vault.patriark.org`)"
      service: "vaultwarden"
      entryPoints:
        - websecure
      middlewares:
        - crowdsec-bouncer@file
        - rate-limit-vaultwarden@file
        - security-headers@file
      tls:
        certResolver: letsencrypt

    # Traefik Dashboard
    traefik-dashboard:
      rule: "Host(`traefik.patriark.org`)"
      service: "api@internal"
      entryPoints:
        - websecure
      middlewares:
        - crowdsec-bouncer@file
        - rate-limit@file
        - authelia@file
      tls:
        certResolver: letsencrypt

    # Jellyfin - Uses native authentication (no Authelia SSO)
    # Media Player clients and web UI both use Jellyfin's built-in auth
    jellyfin-secure:
      rule: "Host(`jellyfin.patriark.org`)"
      service: "jellyfin"
      entryPoints:
        - websecure
      middlewares:
        - crowdsec-bouncer@file
        - rate-limit-public@file
        - compression@file
        - security-headers-jellyfin@file
      tls:
        certResolver: letsencrypt

    # Immich - Uses native authentication (no Authelia SSO)
    # Mobile apps and web UI both use Immich's built-in auth
    # NOTE: No circuit-breaker or retry middleware. Stress test (2026-02-08, 10,608 assets)
    # proved both are harmful for upload-heavy services:
    #   - Circuit breaker trips on client ECONNRESET (mobile disconnections ≠ backend failure)
    #   - Retry middleware can't replay streamed upload bodies (generates double-failures)
    immich-secure:
      rule: "Host(`photos.patriark.org`)"
      service: "immich"
      entryPoints:
        - websecure
      middlewares:
        - crowdsec-bouncer@file
        - rate-limit-immich@file       # Custom high-capacity rate limit for photo browsing
        - compression@file             # Compresses API responses (JSON); binary media unaffected
        - security-headers@file
      tls:
        certResolver: letsencrypt

    # Nextcloud - Uses native authentication (no Authelia SSO)
    # CalDAV/CardDAV clients and web UI use Nextcloud's built-in auth
    # NO security-headers middleware (Nextcloud sets own CSP)
    # HSTS-only middleware (Nextcloud sets CSP, we add HSTS)
    # NOTE: No circuit-breaker or retry middleware. Same rationale as Immich
    # (2026-02-08 stress test). For upload-heavy services with mobile/desktop
    # sync clients:
    #   - Circuit breaker trips on client ECONNRESET (sync clients disconnect
    #     constantly: sleep, network changes, app backgrounding ≠ backend failure)
    #   - Retry can't replay streamed request bodies; WebDAV chunk PUT bodies
    #     are consumed once forwarded. Nextcloud sync clients have their own
    #     retry logic at the WebDAV layer.
    nextcloud-secure:
      rule: "Host(`nextcloud.patriark.org`)"
      service: "nextcloud"
      entryPoints:
        - websecure
      middlewares:
        - crowdsec-bouncer@file
        - rate-limit-nextcloud@file     # High capacity for WebDAV sync (600/min, 3000 burst for PROPFIND tree walks)
        - nextcloud-caldav              # CalDAV/.well-known redirects
        - hsts-only@file                # Add HSTS without conflicting with Nextcloud's CSP
      tls:
        certResolver: letsencrypt

    # Grafana Monitoring Dashboard
    grafana-secure:
      rule: "Host(`grafana.patriark.org`)"
      service: "grafana"
      entryPoints:
        - websecure
      middlewares:
        - crowdsec-bouncer@file
        - rate-limit@file
        - authelia@file
      tls:
        certResolver: letsencrypt

    # Prometheus - INTERNAL ONLY (router removed 2026-07-17, ADR-045)
    # Unused since fall 2025; Grafana is the UI and queries prometheus over the
    # monitoring network. Removing the route is what lets prometheus be
    # single-homed on restricted-egress (GH#334 single-homing invariant).

    # Loki Log Aggregation
    loki-secure:
      rule: "Host(`loki.patriark.org`)"
      service: "loki"
      entryPoints:
        - websecure
      middlewares:
        - crowdsec-bouncer@file
        - rate-limit@file
        - authelia@file
      tls:
        certResolver: letsencrypt

    # Alertmanager - INTERNAL ONLY (accessed via http://alertmanager:9093)
    # Removed public router - Alertmanager is only for internal monitoring stack use
    # Access via Grafana dashboards or direct container access
    # This reduces attack surface for operational infrastructure

    # Gathio Event Management Platform
    gathio-secure:
      rule: "Host(`events.patriark.org`)"
      service: "gathio"
      entryPoints:
        - websecure
      middlewares:
        - crowdsec-bouncer@file
        - rate-limit@file
        - authelia@file               # Protect event creation interface
        - security-headers-gathio@file  # Relaxed CSP for CDN resources
      tls:
        certResolver: letsencrypt

    # Home Assistant - NO Authelia (has own built-in authentication)
    # Mobile app + Web UI work seamlessly without SSO layer
    home-assistant-secure:
      rule: "Host(`ha.patriark.org`)"
      service: "home-assistant"
      entryPoints:
        - websecure
      middlewares:
        - crowdsec-bouncer@file
        # rate-limit-public (200/min, burst 100) — Lovelace cold-load lazy-fetches
        # 50+ JS chunks in parallel and overshoots the default rate-limit tier
        # (100/min, burst 50) intended for Authelia-fronted services. Native-auth
        # services follow rate-limit-public per CLAUDE.md convention.
        - rate-limit-public@file
        # NO authelia@file - HA has robust built-in auth
        - security-headers-ha@file
      tls:
        certResolver: letsencrypt

    # Forgejo - Git forge with native auth
    # NO authelia@file: forward-auth breaks git CLI operations over HTTPS
    forgejo-secure:
      rule: "Host(`git.patriark.org`)"
      service: "forgejo"
      entryPoints:
        - websecure
      middlewares:
        - crowdsec-bouncer@file
        - rate-limit-public@file
        - compression@file
        - security-headers@file
      tls:
        certResolver: letsencrypt

    # Audiobookshelf - Uses native authentication (no Authelia SSO)
    # iOS app (abs) and web UI use Audiobookshelf's built-in auth
    audiobookshelf-secure:
      rule: "Host(`audiobookshelf.patriark.org`)"
      service: "audiobookshelf"
      entryPoints:
        - websecure
      middlewares:
        - crowdsec-bouncer@file
        - rate-limit-public@file
        - compression@file
        - security-headers@file
      tls:
        certResolver: letsencrypt

    # Navidrome - Uses native authentication (no Authelia SSO)
    # Subsonic-compatible clients and web UI use Navidrome's built-in auth
    # Block /metrics from public access (Prometheus scrapes direct via monitoring network)
    navidrome-secure:
      rule: "Host(`musikk.patriark.org`) && !PathPrefix(`/metrics`)"
      service: "navidrome"
      entryPoints:
        - websecure
      middlewares:
        - crowdsec-bouncer@file
        - rate-limit-public@file
        - compression@file
        - security-headers@file
      tls:
        certResolver: letsencrypt

    # qBittorrent - WebUI for torrent management
    # Access restricted by: Authelia SSO + DNS (Pi-hole LAN/VPN only) + no UDM Pro port forward
    # Note: admin-whitelist middleware not used — rootless Podman NATs all client IPs
    # to container network IPs, making IP-based filtering ineffective
    qbittorrent-secure:
      rule: "Host(`torrent.patriark.org`)"
      service: "qbittorrent"
      entryPoints:
        - websecure
      middlewares:
        - crowdsec-bouncer@file
        - rate-limit-qbittorrent@file
        - authelia@file
        - security-headers@file
      tls:
        certResolver: letsencrypt

    # Pi-hole DNS resolver admin (ADR-031 D4) — INTERNAL ONLY (enforced by ip-allowlist)
    # Replaces unauthenticated http://192.168.1.69/admin with SSO-gated HTTPS.
    # NOTE: ADR-031 D4 envisioned "no public DNS record", but a pre-existing wildcard
    # *.patriark.org -> WAN IP makes pihole.patriark.org publicly RESOLVABLE. So the
    # enforcing "internal-only" control is the ip-allowlist (LAN+WG), NOT DNS hiding:
    # a non-LAN/WG client reaches Traefik via the WAN and is 403'd at the allowlist
    # before Authelia. Pi-hole also has a local DNS record pihole.patriark.org ->
    # 192.168.1.70 so LAN/VPN clients hit this host directly. Cert via Cloudflare DNS-01.
    # Requires an Authelia access_control rule (two_factor, group:admins) — added 2026-05-26.
    # Chain (ADR-031 D4 / ADR-016 — routing here, not labels):
    #   crowdsec -> rate-limit -> ip-allowlist (LAN+WG) -> authelia SSO -> headers
    # Phase 3: repoint the `pihole` service at the keepalived VIP (192.168.1.72; re-addressed 2026-06-12).
    pihole-admin:
      rule: "Host(`pihole.patriark.org`)"
      service: "pihole"
      entryPoints:
        - websecure
      middlewares:
        - crowdsec-bouncer@file
        - rate-limit@file
        - ip-allowlist@file
        - authelia@file
        - security-headers@file
      tls:
        certResolver: letsencrypt

  services:
    jellyfin:
      loadBalancer:
        servers:
          - url: "http://jellyfin:8096"

    immich:
      loadBalancer:
        servers:
          - url: "http://immich-server:2283"

    grafana:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"

    # prometheus: (removed 2026-07-17 — internal-only, see router note above)

    loki:
      loadBalancer:
        servers:
          - url: "http://loki:3100"

    # alertmanager: (removed - internal-only service, no public router needed)

    authelia:
      loadBalancer:
        servers:
          - url: "http://authelia:9091"

    vaultwarden:
      loadBalancer:
        servers:
          - url: "http://vaultwarden:80"

    nextcloud:
      loadBalancer:
        servers:
          - url: "http://nextcloud:80"

    gathio:
      loadBalancer:
        servers:
          - url: "http://gathio:3000"

    forgejo:
      loadBalancer:
        servers:
          - url: "http://forgejo:3000"

    home-assistant:
      loadBalancer:
        servers:
          - url: "http://home-assistant:8123"

    audiobookshelf:
      loadBalancer:
        servers:
          - url: "http://audiobookshelf:80"

    navidrome:
      loadBalancer:
        servers:
          - url: "http://navidrome:4533"

    qbittorrent:
      loadBalancer:
        servers:
          - url: "http://qbittorrent:8085"

    # Pi-hole resolver admin (ADR-031 D4). Literal LAN IP — no /etc/hosts (ADR-018)
    # entry needed (that's only for podman aardvark-dns ordering of *container*
    # names). Traefik reaches it via reverse_proxy LAN egress (same path Prometheus
    # uses to scrape the Pi). Phase 3 cutover (GH#292): change to the keepalived VIP
    # http://192.168.1.72:80 (VIP re-addressed 2026-06-12: .53 sat in DHCP space).
    pihole:
      loadBalancer:
        servers:
          - url: "http://192.168.1.69:80"

  middlewares:
    # CalDAV/.well-known redirects for Nextcloud
    nextcloud-caldav:
      redirectRegex:
        permanent: true
        regex: "^https://(.*)/.well-known/(card|cal)dav"
        replacement: "https://${1}/remote.php/dav/"
