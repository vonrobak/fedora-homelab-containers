# Prometheus Configuration for Homelab
# Last Updated: 2025-11-06

global:
  scrape_interval: 15s      # How often to scrape targets
  evaluation_interval: 15s  # How often to evaluate rules
  external_labels:
    cluster: 'homelab'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Load alerting and recording rules
rule_files:
  - "alerts/*.yml"
  - "rules/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself (self-monitoring)
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'fedora-htpc'
          service: 'prometheus'

  # Node Exporter (system metrics)
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']
        labels:
          instance: 'fedora-htpc'
          service: 'node_exporter'

  # Grafana monitoring
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          instance: 'fedora-htpc'
          service: 'grafana'
    # Metric diet — drop grafana_feature_toggles_info (346 unused series, one per
    # feature flag). No dashboard/rule consumes any grafana_* metric; operational
    # series (grafana_http_request_*, grafana_build_info, datasource health) are kept
    # for ad-hoc debugging. Audited 2026-05-25; see plan / deep-dive report §3.
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'grafana_feature_toggles_info'
        action: drop

  # Traefik monitoring (metrics enabled 2025-11-06)
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']
        labels:
          instance: 'fedora-htpc'
          service: 'traefik'

  # Alertmanager monitoring
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          instance: 'fedora-htpc'
          service: 'alertmanager'

  # Loki log aggregation
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
        labels:
          instance: 'fedora-htpc'
          service: 'loki'

  # Promtail log collector
  - job_name: 'promtail'
    static_configs:
      - targets: ['promtail:9080']
        labels:
          instance: 'fedora-htpc'
          service: 'promtail'

  # CrowdSec security monitoring
  - job_name: 'crowdsec'
    static_configs:
      - targets: ['crowdsec:6060']
        labels:
          instance: 'fedora-htpc'
          service: 'crowdsec'

  # cAdvisor - Container metrics exporter
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          instance: 'fedora-htpc'
          service: 'cadvisor'
    # Metric diet (allowlist) — keep ONLY the container_/machine_ series consumed by a
    # dashboard or rule. cAdvisor emits ~16.5k series; this retains ~3k and drops ~13.6k
    # unreferenced series (container_tasks_state, *_memory_failures_total,
    # *_blkio_device_usage_total, per-device *_fs_reads/writes_total, *_pressure_io_*, …).
    # Allowlist (not denylist) so future cAdvisor metric additions stay dropped by default.
    # Keep-list audited 2026-05-25 against all dashboards + alert/recording rules.
    # See docs/97-plans/2026-05-25-monitoring-metric-diet.md + deep-dive report §3.
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'container_(cpu_usage_seconds_total|memory_usage_bytes|memory_working_set_bytes|spec_memory_limit_bytes|network_receive_bytes_total|network_transmit_bytes_total|fs_reads_bytes_total|fs_writes_bytes_total|last_seen|start_time_seconds)|machine_(memory_bytes|cpu_cores)|cadvisor_version_info|container_scrape_error'
        action: keep

  # Unpoller - UniFi Network metrics exporter
  - job_name: 'unpoller'
    static_configs:
      - targets: ['unpoller:9130']
        labels:
          instance: 'fedora-htpc'
          service: 'unpoller'

  # Nextcloud monitoring removed - ServerInfo endpoint requires auth
  # Nextcloud availability monitored via Traefik metrics (SLO recording rules)

  # Navidrome - Music Streaming Server (native Prometheus metrics)
  # Scraped via reverse_proxy network (Navidrome no longer on monitoring)
  - job_name: 'navidrome'
    static_configs:
      - targets: ['10.89.2.75:4533']
        labels:
          instance: 'fedora-htpc'
          service: 'navidrome'

  # Home Assistant - Home Automation Hub
  # Static IP: HA is multi-network (reverse_proxy + home_automation),
  # hostname resolution non-deterministic per ADR-018
  - job_name: 'home-assistant'
    static_configs:
      - targets: ['10.89.2.76:8123']
        labels:
          instance: 'fedora-htpc'
          service: 'home-assistant'
    metrics_path: '/api/prometheus'
    bearer_token_file: '/run/secrets/ha-prometheus-token'

  # Redis exporter — redis-authelia (session cache + regulation counters)
  # Scraped via monitoring network static IP (ADR-018)
  - job_name: 'redis-authelia'
    static_configs:
      - targets: ['10.89.4.92:9121']
        labels:
          instance: 'fedora-htpc'
          service: 'redis-authelia'
    # Metric diet — drop the unused per-command latency histogram (~632 series:
    # _bucket/_sum/_count). Dashboards use redis_commands_duration_seconds_total /
    # redis_command_calls_total, which are kept. Audited 2026-05-25 (plan / report §3).
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'redis_commands_latencies_usec_(bucket|sum|count)'
        action: drop

  # Redis exporter — redis-immich (Valkey, Redis-protocol-compatible)
  - job_name: 'redis-immich'
    static_configs:
      - targets: ['10.89.4.93:9121']
        labels:
          instance: 'fedora-htpc'
          service: 'redis-immich'
    # Metric diet — drop the unused per-command latency histogram (see redis-authelia).
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'redis_commands_latencies_usec_(bucket|sum|count)'
        action: drop

  # PostgreSQL exporter — postgresql-immich
  - job_name: 'postgres-immich'
    static_configs:
      - targets: ['10.89.4.94:9187']
        labels:
          instance: 'fedora-htpc'
          service: 'postgres-immich'

  # ===========================================================================
  # ADR-031 Phase 2 — DNS resolver observability
  # ===========================================================================

  # node_exporter on the Pi-hole resolver (raspberrypi @ 192.168.1.69)
  # Reachable directly from Prometheus (reverse_proxy network has LAN egress).
  # ufw on the Pi already allows .70 → 9100 (applied via Ansible role node_exporter).
  - job_name: 'node-exporter-pi'
    static_configs:
      - targets: ['192.168.1.69:9100']
        labels:
          instance: 'raspberrypi'
          service: 'node_exporter'
          role: 'dns_resolver'

  # Pi-hole exporter — query/block stats from the Pi-hole v6 API.
  # Timeout/interval (2026-06-07): the exporter serves /metrics SYNCHRONOUSLY —
  # each scrape runs a full Pi-hole v6 login→query cycle. Steady-state latency is
  # ~0.26s, but a wedged/degraded exporter (or a slow transient) can spike to
  # 6–14s. The global default scrape_timeout=10s tripped up=0 for 3 days on
  # 2026-06-04 with a false "down" page. 20s timeout gives huge headroom over
  # normal so transients never flap `up`; a genuinely stalled exporter (>20s) is
  # still caught by PiHoleExporterDown (warning, for:5m) + the watchdog timer.
  # 30s interval matches the exporter's own INTERVAL=30s and reduces Pi-hole API
  # login churn (also eases the GH#246 session leak). timeout must be ≤ interval.
  - job_name: 'pihole'
    scrape_interval: 30s
    scrape_timeout: 20s
    static_configs:
      - targets: ['pihole-exporter:9617']
        labels:
          instance: 'raspberrypi'
          service: 'pihole'
          role: 'dns_resolver'

  # Blackbox DNS probes — *functional* signal (correctness > liveness).
  # dns_functional: resolver returns a real A record for patriark.org.
  # dns_blocked   : resolver sink-holes doubleclick.net to 0.0.0.0 (gravity health).
  # Cadence: liveness-class probe — outages caught within one alert window (for: 3m).
  # 30s is fast enough for that; 15s would just dirty Pi-hole's query log without
  # earlier detection (real outages also show up in pihole-exporter query metrics).
  - job_name: 'blackbox-dns-functional'
    scrape_interval: 30s
    metrics_path: /probe
    params:
      module: [dns_functional]
    static_configs:
      - targets:
          - 192.168.1.69  # node A (only resolver today; node B + VIP added in Phase 3)
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
      - target_label: probe
        replacement: dns_functional

  # Cadence: config-drift canary — gravity regressions are a slow signal (hours/days).
  # Alert uses for: 10m, so 5m interval gives 2+ samples per window. Probing faster
  # adds no detection speed and pollutes Pi-hole's query log (which the operator uses
  # to investigate genuine network anomalies — see GH#TBD pihole-exporter session
  # hygiene + 2026-05-28 conversation).
  - job_name: 'blackbox-dns-blocked'
    scrape_interval: 5m
    metrics_path: /probe
    params:
      module: [dns_blocked]
    static_configs:
      - targets:
          - 192.168.1.69
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
      - target_label: probe
        replacement: dns_blocked

  # GH#164 — Nextcloud maintenance / DB-upgrade stuck-state probe.
  # Probes nextcloud's reverse_proxy interface (same target Traefik uses).
  - job_name: 'blackbox-nextcloud-status'
    metrics_path: /probe
    params:
      module: [nextcloud_status]
    static_configs:
      - targets:
          - http://10.89.2.82/status.php
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
      - target_label: service
        replacement: nextcloud
      - target_label: probe
        replacement: nextcloud_status
