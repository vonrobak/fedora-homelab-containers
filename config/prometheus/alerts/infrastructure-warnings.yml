# Infrastructure Warning Alerts
# Created: 2026-01-17 (Phase 4 - Alert Consolidation)
# Purpose: Performance degradation, capacity warnings - proactive monitoring
# Severity: warning - Discord during waking hours only (7am-11pm)
#
# FIX 2026-06-12 (WP1): the `and ALERTS{alertname="X"} != 1` hysteresis pattern
# made 5 alerts here structurally DEAD. ALERTS series always have value 1 while
# pending/firing and don't exist otherwise, so `!= 1` matches nothing — the
# fire-branch was always empty and the alerts could never even go pending
# (verified 2026-06-12; same dead-alert class as the BtrfsPoolSpaceWarning
# mountpoint bug fixed 2026-05-25 — which notably dropped its hysteresis).
# Anti-flap intent preserved with keep_firing_for instead: once firing, the
# alert holds for N minutes after the condition clears.

groups:
  - name: infrastructure_warnings
    interval: 1m
    rules:
      # ========================================================================
      # ALERT 1: System Disk Space Warning
      # ========================================================================
      # Anti-flap: keep_firing_for holds the alert 30m after free space recovers
      - alert: SystemDiskSpaceWarning
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.25
        for: 5m
        keep_firing_for: 30m
        labels:
          severity: warning
          category: capacity
          component: system
        annotations:
          summary: "System disk space low"
          description: "System SSD {{ $labels.instance }} has {{ $value | humanizePercentage }} free space remaining (Warning threshold: <25%)"

      # ========================================================================
      # ALERT 2: BTRFS Pool Space Warning
      # ========================================================================
      # FIX 2026-05-25 (Plan C): mountpoint was "/mnt/btrfs-pool", which node_exporter
      # never reports (the data pool is mounted at "/mnt"; "btrfs-pool" is only a path
      # component). The alert returned 0 series and was a silent DEAD alert. Corrected
      # to mountpoint="/mnt". Threshold lowered 0.20 -> 0.15 (owner decision 2026-05-25):
      # the pool sits at ~19.8% free / ~80% used (~3.1 TB absolute), and the dead alert
      # had masked that. 15% keeps the signal without paging on today's steady state;
      # BtrfsPoolSpaceCritical (<10%) escalates. Revisit if /mnt usage keeps climbing.
      - alert: BtrfsPoolSpaceWarning
        expr: (node_filesystem_avail_bytes{mountpoint="/mnt"} / node_filesystem_size_bytes{mountpoint="/mnt"}) < 0.15
        for: 10m
        labels:
          severity: warning
          category: capacity
          component: storage
        annotations:
          summary: "BTRFS pool space low"
          description: "BTRFS pool {{ $labels.instance }} has {{ $value | humanizePercentage }} free space remaining (Warning threshold: <20%)"

      # ========================================================================
      # ALERT 3: TLS Certificate Renewal Overdue
      # ========================================================================
      # Let's Encrypt auto-renews at ~30 days remaining. If a cert reaches <14 days,
      # renewal failed ~16 days ago -- something is wrong. The critical alert
      # CertificateExpiringSoon (<7 days) in infrastructure-critical.yml is the escalation.
      # Only check the NEWEST certificate per domain (Traefik keeps old certs in metrics after renewal)
      - alert: CertificateRenewalOverdue
        expr: max by(cn) ((traefik_tls_certs_not_after - time()) / 86400) < 14 and max by(cn) ((traefik_tls_certs_not_after - time()) / 86400) >= 7
        for: 6h
        labels:
          severity: info
          category: security
        annotations:
          summary: "TLS certificate renewal overdue for {{ $labels.cn }}"
          description: "Certificate for {{ $labels.cn }} expires in {{ $value | humanize }} days. Let's Encrypt should have renewed this ~16 days ago. Check Traefik ACME logs: podman logs traefik 2>&1 | grep -i acme"

      # ========================================================================
      # ALERT 4: High CPU Usage
      # ========================================================================
      # Note: Jellyfin transcoding legitimately uses 50-80% CPU (per CLAUDE.md)
      - alert: HighCPUUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 20m
        keep_firing_for: 15m
        labels:
          severity: warning
          category: performance
          component: system
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 90% ({{ $value | humanize }}%) for more than 20 minutes. This may indicate system overload."

      # ========================================================================
      # ALERT 5: Filesystem Filling Up (Predictive)
      # ========================================================================
      # Predict if filesystem will fill in 4 hours based on current growth rate
      - alert: FilesystemFillingUp
        expr: |
          (
            node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} > 0
            and
            predict_linear(node_filesystem_avail_bytes{mountpoint="/"}[1h], 4*3600) < 0
          )
        for: 1h
        labels:
          severity: warning
          category: capacity
          component: system
        annotations:
          summary: "Filesystem is predicted to fill up"
          description: "Filesystem on {{ $labels.instance }} is predicted to run out of space within 4 hours based on current growth rate."

      # ========================================================================
      # ALERT 6: Memory Pressure High
      # ========================================================================
      - alert: MemoryPressureHigh
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.90
        for: 5m
        keep_firing_for: 15m
        labels:
          severity: warning
          category: performance
          component: system
        annotations:
          summary: "Memory pressure high"
          description: "System memory usage is {{ $value | humanizePercentage }}. May cause OOM kills."

      # ========================================================================
      # ALERT 7: Swap Thrashing
      # ========================================================================
      # Calibrated for zram (compressed in-memory swap):
      # - Baseline zram activity: ~230 pages/sec (normal)
      # - Alert threshold: 1000 pages/sec (indicates actual problem)
      # - Requires system impact: High load OR memory pressure to confirm degradation
      #
      # Note: zram swap I/O is CPU-bound compression, NOT disk I/O.
      # High page rates without load impact are normal zram behavior.
      - alert: SwapThrashing
        expr: |
          (
            rate(node_vmstat_pswpin[5m]) > 1000 or rate(node_vmstat_pswpout[5m]) > 1000
          )
          and
          (
            node_load5 / count(node_cpu_seconds_total{mode="idle"}) > 0.7
            or
            node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.15
          )
        for: 10m
        keep_firing_for: 15m
        labels:
          severity: warning
          category: performance
          component: system
        annotations:
          summary: "System is swap thrashing with performance impact"
          description: "Swap I/O is {{ $value | humanize }} pages/sec with elevated system load. This indicates memory pressure causing actual performance degradation. Check for memory-hungry processes or abnormal virtual memory allocation (e.g., browser tab explosion)."

      # ========================================================================
      # ALERT 8: High System Load
      # ========================================================================
      - alert: HighSystemLoad
        expr: node_load15 / count(node_cpu_seconds_total{mode="idle"}) > 1.5
        for: 15m
        keep_firing_for: 15m
        labels:
          severity: warning
          category: performance
          component: system
        annotations:
          summary: "High system load sustained for 15+ minutes"
          description: "15-minute load average is {{ $value | humanize }}x CPU count. System may be overloaded."
