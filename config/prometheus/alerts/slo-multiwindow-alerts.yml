  # ===========================================================================
  # NEXTCLOUD LATENCY SLO (G2, added 2026-05-25)
  # SLO-008: 95% of requests complete within 1s. Nextcloud is the only service with
  # clean, high-volume, correctly-bucketed latency data (~28.8k req/7d, baseline
  # ~99.7% under 1s — see slo-framework.md "Latency alerting status" for why the
  # other candidate latency SLOs are not currently alertable). fast_ratio is NaN
  # when idle (NaN < 0.95 is false), and a minimum-traffic guard prevents a single
  # slow request during a lull from tripping the alert. Named outside the
  # SLOBurnRateTier* convention so it does NOT hit the auto-remediation webhook —
  # slow file sync warrants a notification, not an automated restart.
  # ===========================================================================
  - name: slo_latency_nextcloud
    interval: 1m
    rules:
      - alert: NextcloudLatencySLOBreach
        expr: |
          sli:nextcloud:latency:fast_ratio < 0.95
          and
          sum(rate(traefik_service_request_duration_seconds_count{exported_service="nextcloud@file"}[5m])) > 0.05
        for: 30m
        labels:
          severity: warning
          component: slo
          service: nextcloud
          slo: latency
        annotations:
          summary: "⚠️ Nextcloud latency SLO breached (<95% of requests under 1s for 30m)"
          description: |
            Fewer than 95% of Nextcloud requests are completing within the 1s SLO target,
            sustained for 30 minutes at meaningful traffic. File sync and web UI feel slow.

            - Requests under 1s (5m): {{ $value | humanizePercentage }}
            - p95 latency: {{ query "sli:nextcloud:latency:p95" | first | value | humanize }}s

            Likely causes: MariaDB slowness, Redis pressure, PHP-FPM saturation, or a
            large sync/scan. Check:
              podman logs nextcloud --tail 100
              podman exec -u www-data nextcloud php occ status
              ~/containers/scripts/homelab-intel.sh

  # ===========================================================================
  # COMPENSATING 4xx ALERTS for denylist services
  # Home Assistant, Nextcloud, Navidrome, and Audiobookshelf use code!~"5.." for SLO.
  # These alerts catch 4xx spikes that bypass burn rate detection:
  #   - 429: rate limiting firing (possible attack or misconfigured client)
  #   - 403: middleware misconfiguration
  #   - sustained high 404: broken integration or misconfigured client
  # ===========================================================================
  - name: denylist_services_4xx_compensating
    interval: 1m
    rules:
      - alert: NextcloudHigh4xxRate
        # Nextcloud has high traffic (~4,200 req/day) so 5m window is appropriate.
        # WebDAV sync naturally produces 404s (moved/deleted files) and 401s, but
        # sustained >10% 4xx rate for 10 minutes likely indicates a real problem.
        # Minimum traffic guard: 0.01 req/s (~5 req/5m) prevents false positives
        # during restarts or traffic lulls where a single 4xx would show as 100%.
        expr: |
          (
            sum(rate(traefik_service_requests_total{exported_service="nextcloud@file", code=~"4.."}[5m]))
            / clamp_min(sum(rate(traefik_service_requests_total{exported_service="nextcloud@file"}[5m])), 1e-10)
          ) > 0.10
          and
          sum(rate(traefik_service_requests_total{exported_service="nextcloud@file"}[5m])) > 0.01
        for: 10m
        labels:
          severity: warning
          component: slo
          service: nextcloud
        annotations:
          summary: "Nextcloud 4xx rate above 10% for 10 minutes"
          description: |
            Current 4xx rate: {{ $value | humanizePercentage }}

            This alert compensates for the SLO denylist criteria (code!~"5..") which
            excludes 4xx from burn rate detection. A sustained 4xx spike may indicate:
            - 404: Broken WebDAV sync or misconfigured client
            - 401: Authentication issues
            - 429: Rate limiting (attack or sync storm)

            Check Traefik access logs in Loki for code breakdown:
              {container_name="traefik"} |= "nextcloud" | json | status >= 400 | status < 500

      - alert: HomeAssistantHigh4xxRate
        # Uses 30m rate window (not 5m like audio services) because HA has very low
        # Traefik traffic (~37 req/day). With a 5m window, a single 404 would show as
        # 100% error rate and trigger the alert. The 30m window + minimum traffic guard
        # smooths low-traffic variance while still catching sustained 4xx spikes.
        expr: |
          (
            sum(rate(traefik_service_requests_total{exported_service="home-assistant@file", code=~"4.."}[30m]))
            / clamp_min(sum(rate(traefik_service_requests_total{exported_service="home-assistant@file"}[30m])), 1e-10)
          ) > 0.10
          and
          sum(rate(traefik_service_requests_total{exported_service="home-assistant@file"}[30m])) > 0.001
        for: 10m
        labels:
          severity: warning
          component: slo
          service: home-assistant
        annotations:
          summary: "Home Assistant 4xx rate above 10% for 10 minutes"
          description: |
            Current 4xx rate: {{ $value | humanizePercentage }}

            This alert compensates for the SLO denylist criteria (code!~"5..") which
            excludes 4xx from burn rate detection. A sustained 4xx spike may indicate:
            - 403: Middleware or auth misconfiguration
            - 404: Broken integration or asset path change
            - 429: Rate limiting (attack or automation loop)

            Check: podman logs home-assistant --tail 100

      - alert: NavidromeHigh4xxRate
        expr: |
          (
            sum(rate(traefik_service_requests_total{exported_service="navidrome@file", code=~"4.."}[5m]))
            / clamp_min(sum(rate(traefik_service_requests_total{exported_service="navidrome@file"}[5m])), 1e-10)
          ) > 0.10
        for: 10m
        labels:
          severity: warning
          component: slo
          service: navidrome
        annotations:
          summary: "Navidrome 4xx rate above 10% for 10 minutes"
          description: |
            Current 4xx rate: {{ $value | humanizePercentage }}

            This alert compensates for the SLO denylist criteria (code!~"5..") which
            excludes 4xx from burn rate detection. A sustained 4xx spike may indicate:
            - 429: Rate limiting firing (attack or misconfigured client)
            - 403: Middleware misconfiguration
            - Elevated 404: Broken integration

            Check Traefik access logs in Loki for code breakdown:
              {container_name="traefik"} |= "navidrome" | json | status >= 400 | status < 500

      - alert: AudiobookshelfHigh4xxRate
        expr: |
          (
            sum(rate(traefik_service_requests_total{exported_service="audiobookshelf@file", code=~"4.."}[5m]))
            / clamp_min(sum(rate(traefik_service_requests_total{exported_service="audiobookshelf@file"}[5m])), 1e-10)
          ) > 0.10
        for: 10m
        labels:
          severity: warning
          component: slo
          service: audiobookshelf
        annotations:
          summary: "Audiobookshelf 4xx rate above 10% for 10 minutes"
          description: |
            Current 4xx rate: {{ $value | humanizePercentage }}

            This alert compensates for the SLO denylist criteria (code!~"5..") which
            excludes 4xx from burn rate detection.

            Check: podman logs audiobookshelf --tail 100

  # ===========================================================================
  # LOW-VOLUME SUSTAINED-5xx COMPENSATING ALERTS
  # Designed for the class of incident documented in
  # docs/98-journals/2026-04-21-nextcloud-slo-collapse-postmortem.md:
  # a service whose only traffic is probes (~1 req/min) can sit at ~90% 5xx
  # for days without tripping the multi-window burn-rate machinery, which is
  # sized for high-traffic services. The SLO dashboard will register 27x
  # budget burn weeks after the fact, but no page fires in real time.
  #
  # These alerts fire on sustained absolute 5xx count over a long window
  # combined with a low-traffic guard. The thresholds are per-service,
  # calibrated against each service's typical traffic floor.
  # ===========================================================================
  - name: low_volume_sustained_5xx_compensating
    interval: 1m
    rules:
      - alert: NextcloudSustained5xxLowVolume
        # During the 2026-04-06 → 2026-04-14 incident: ~30-40 503s/hr against
        # ~36 req/hr of probes → ~180-240 5xx per 6h at <0.5 req/s. Threshold
        # of 100 fires well inside the incident envelope but is comfortably
        # above any transient restart noise.
        expr: |
          sum(increase(traefik_service_requests_total{exported_service="nextcloud@file", code=~"5.."}[6h])) > 100
          and
          sum(rate(traefik_service_requests_total{exported_service="nextcloud@file"}[6h])) < 0.5
        for: 1h
        labels:
          severity: warning
          component: slo
          service: nextcloud
        annotations:
          summary: "Nextcloud sustained 5xx at low traffic (>100 5xx in 6h, <0.5 req/s)"
          description: |
            Nextcloud has returned more than 100 5xx responses over the last 6 hours
            while running at less than 0.5 req/s. This is the signature of a stuck
            maintenance/upgrade state (see 2026-04-21 postmortem) that the burn-rate
            alerts are blind to at this traffic level.

            Check:
              podman exec -u www-data nextcloud php occ status
              podman exec -u www-data nextcloud php occ upgrade      # if needsDbUpgrade
              curl -sf https://nextcloud.patriark.org/status.php | jq

            Runbook reference: scripts/post-update-health-check.sh:76-116

      - alert: HomeAssistantSustained5xxLowVolume
        # HA runs at ~37 req/day through Traefik (most traffic is websocket/LAN).
        # In 6h that's ~9 requests; a stuck-5xx state would produce at most
        # ~9 5xx. Threshold of 20 requires at least ~2 full 6h windows of
        # sustained failure or a burst of probe retries.
        expr: |
          sum(increase(traefik_service_requests_total{exported_service="home-assistant@file", code=~"5.."}[6h])) > 20
          and
          sum(rate(traefik_service_requests_total{exported_service="home-assistant@file"}[6h])) < 0.5
        for: 1h
        labels:
          severity: warning
          component: slo
          service: home-assistant
        annotations:
          summary: "Home Assistant sustained 5xx at low traffic (>20 5xx in 6h)"
          description: |
            Home Assistant has returned more than 20 5xx responses over the last 6
            hours at low request rate. At this traffic level the standard burn-rate
            alerts can't distinguish a stuck-503 state from normal idle traffic.

            Check:
              systemctl --user status home-assistant.service
              podman logs home-assistant --tail 100
              curl -sf -o /dev/null -w '%{http_code}' https://home.patriark.org/

      - alert: NavidromeSustained5xxLowVolume
        # G4 (added 2026-05-25): closes the last instance of the 2026-04-21
        # low-volume-5xx incident class. Navidrome is a personal music service that
        # is frequently idle (0 requests in the trailing 7d at calibration time), so
        # — like Home Assistant — its multi-window burn-rate alerts are blind to a
        # stuck-5xx state at low traffic. Threshold mirrors HomeAssistantSustained5xx
        # LowVolume (>20 5xx in 6h, <0.5 req/s guard); could not be scaled to live
        # traffic because Navidrome was idle when this was written. Revisit once a
        # real traffic floor accumulates.
        expr: |
          sum(increase(traefik_service_requests_total{exported_service="navidrome@file", code=~"5.."}[6h])) > 20
          and
          sum(rate(traefik_service_requests_total{exported_service="navidrome@file"}[6h])) < 0.5
        for: 1h
        labels:
          severity: warning
          component: slo
          service: navidrome
        annotations:
          summary: "Navidrome sustained 5xx at low traffic (>20 5xx in 6h)"
          description: |
            Navidrome has returned more than 20 5xx responses over the last 6 hours
            at low request rate. At this traffic level the standard burn-rate alerts
            cannot distinguish a stuck-5xx state from normal idle traffic.

            Check:
              systemctl --user status navidrome.service
              podman logs navidrome --tail 100
              curl -sf -o /dev/null -w '%{http_code}' https://navidrome.patriark.org/
