groups:
  - name: db_dump_alerts
    interval: 60s
    rules:
      # Critical: an engine's application-consistent dump failed.
      # Tier-2 DBs (subvol8-db) are NOT in the snapshot set, so a failed dump
      # means that engine's offsite backup is stale until fixed.
      - alert: DbDumpFailed
        expr: db_dump_success == 0
        for: 5m
        labels:
          severity: critical
          category: backup
          component: db-dump
        annotations:
          summary: "DB dump failed for {{ $labels.database }}"
          description: "Last application-consistent dump for {{ $labels.database }} failed. Its Tier-2 offsite backup is stale. Check `journalctl --user -u db-dump.service`."

      # Critical: no successful dump in 2+ days (last_success_timestamp is carried
      # forward across failed runs, so this ages correctly).
      - alert: DbDumpStale
        expr: (time() - db_dump_last_success_timestamp) > (86400 * 2)
        for: 1h
        labels:
          severity: critical
          category: backup
          component: db-dump
        annotations:
          summary: "DB dump stale for {{ $labels.database }}"
          description: "No successful dump for {{ $labels.database }} in {{ $value | humanizeDuration }}."

      # Warning: the dump job itself hasn't run (timer stopped / host down).
      - alert: DbDumpJobNotRunning
        expr: (time() - db_dump_last_run_timestamp) > (86400 * 2)
        for: 6h
        labels:
          severity: warning
          category: backup
          component: db-dump
        annotations:
          summary: "db-dump job hasn't run in 2+ days"
          description: "db-dump.sh last ran {{ $value | humanizeDuration }} ago. Check `systemctl --user status db-dump.timer`."

      # --- The two rules below activate with the restore-test job (Phase A.4). ---
      # They are inert until db_restore_test_* series exist (absent metric => no fire).
      - alert: DbRestoreTestFailed
        expr: db_restore_test_success == 0
        for: 5m
        labels:
          severity: critical
          category: disaster-recovery
          component: db-restore-test
        annotations:
          summary: "DB restore test failed for {{ $labels.database }}"
          description: "Ephemeral restore validation failed for {{ $labels.database }} — its dumps may be unrestorable."

      - alert: DbRestoreTestOverdue
        expr: (time() - db_restore_test_last_timestamp) > (86400 * 10)
        for: 6h
        labels:
          severity: warning
          category: disaster-recovery
          component: db-restore-test
        annotations:
          summary: "DB restore test overdue for {{ $labels.database }}"
          description: "No restore test for {{ $labels.database }} in {{ $value | humanizeDuration }} (should run weekly)."

      # Warning: a DB-like service/data dir is not in db-dump.sh's ENGINES array
      # and not a recorded exception — it is getting ZERO backup with zero other
      # warning (the forgejo-db gap class that motivated ADR-029 / L-019).
      # Emitted by scripts/audit-dump-coverage.sh after each nightly dump run.
      - alert: DbDumpCoverageGap
        expr: db_dump_coverage_gap == 1
        for: 15m
        labels:
          severity: warning
          category: backup
          component: db-dump
        annotations:
          summary: "DB dump coverage gap: {{ $labels.database }} is not backed up"
          description: "{{ $labels.database }} (found via {{ $labels.origin }}) is a DB-like service with no dump coverage. Add it to ENGINES in db-dump.sh + db-restore-test.sh, or record a decided exception in audit-dump-coverage.sh."

      # Warning: the coverage audit itself stopped running (guards the guard).
      # It runs as ExecStartPost of the nightly db-dump.service.
      - alert: DbDumpCoverageAuditStale
        expr: (time() - db_dump_coverage_audit_timestamp) > (86400 * 2)
        for: 6h
        labels:
          severity: warning
          category: backup
          component: db-dump
        annotations:
          summary: "Dump-coverage audit hasn't run in 2+ days"
          description: "audit-dump-coverage.sh last ran {{ $value | humanizeDuration }} ago — new uncovered databases would go unnoticed. Check db-dump.service ExecStartPost wiring."

      # Warning: a dump ballooned vs its own recent baseline — catches a runaway
      # table/DB or a misconfigured dump before it pressures the offsite dump set.
      # Guards against false positives:
      #   (1) exclude prometheus — its dump tracks TSDB size (addressed by Plan A's
      #       metric diet), not data health, and it dominates the set at ~1.6 GB;
      #   (2) absolute floor (50 MiB) so tiny dumps (gathio ~16 KB, forgejo ~47 KB,
      #       vaultwarden ~180 KB) can't trip on normal variance — only meaningfully
      #       large dumps matter to the 4.6 GB offsite set.
      # Baseline = 14-day median; only ~3 days of history exists today (2026-05-25),
      # which widens automatically. Median (not avg) resists the nightly step shape.
      - alert: DbDumpSizeAnomaly
        expr: |
          db_dump_size_bytes{database!="prometheus"}
            > 2 * quantile_over_time(0.5, db_dump_size_bytes{database!="prometheus"}[14d])
          and db_dump_size_bytes{database!="prometheus"} > 50 * 1024 * 1024
        for: 30m
        labels:
          severity: warning
          category: backup
          component: db-dump
        annotations:
          summary: "DB dump for {{ $labels.database }} doubled vs its 14-day median"
          description: "Latest {{ $labels.database }} dump is {{ $value | humanize1024 }}B — over 2x its 14-day median. Check for a runaway table or misconfigured dump before it pressures the offsite dump set."
