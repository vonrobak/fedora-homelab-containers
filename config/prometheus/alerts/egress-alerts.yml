# ADR-030 P7 (Tier 4) — Egress Observatory alerts.
#
# SHIPPED DISABLED (shadow-first). Prometheus loads `alerts/*.yml`, so this `.disabled`
# file is inert. ARM it AFTER the baseline window has seeded egress-baseline.yaml and the
# detector is switched to live mode: rename to `egress-alerts.yml`, validate
# (`podman exec prometheus promtool check rules /etc/prometheus/alerts/egress-alerts.yml`),
# and Prometheus auto-reloads. Arming before the allow-list is seeded would flood Discord
# with false positives (every destination is "unexpected" pre-baseline) — see the repo's
# "don't wire an alert until you've seen it fire on real data" lesson (PR #225/#226).
groups:
  - name: egress_alerts
    interval: 60s
    rules:
      # Warning (informational): an egress-tier service reached a PUBLIC destination not in
      # its frozen-prefix allow-list (ADR-030 P7) within the last 24h. Usually a legitimate
      # new destination (provider added ranges, or a one-off like a plugin/metadata fetch →
      # re-baseline) — but could be the first sighting of the residual threat this tier exists
      # for. This fires on ANY observation, including a single one-off, so it is intentionally
      # routed to notify ONCE (Alertmanager repeat_interval: 24h) and auto-resolves when the
      # 24h recency window lapses. SUSTAINED egress escalates separately (the critical below).
      - alert: EgressUnexpectedDestination
        expr: egress_unexpected_destination_count > 0
        for: 10m
        labels:
          severity: warning
          category: security
          component: egress
        annotations:
          # $labels.service is the real per-service textfile label — preserved by
          # honor_labels: true on the node_exporter scrape job (see prometheus.yml).
          summary: "New/recent unexpected egress destination from {{ $labels.service }}"
          description: "{{ $labels.service }} reached {{ $value }} public destination(s) outside its allow-list in the last 24h (ADR-030 P7). Often a legitimate change or a one-off (plugin/metadata fetch). Informational — notifies once, will NOT repeat, and self-clears after 24h. Inspect `data/egress/anomalies.jsonl` (service={{ $labels.service }}); if legitimate, re-baseline via `scripts/egress-baseline.sh` → merge into `config/supply-chain/egress-baseline.yaml`. If it recurs across >=1h it escalates to a SUSTAINED critical."

      # Critical: SUSTAINED unexpected egress. Keys on egress_unexpected_destination_persistent,
      # which the detector sets only when an unexpected destination's observation span
      # (first→last) reaches EGRESS_PERSIST_MIN (default 1h) AND it is still recent. This is the
      # honest persistence signal: a one-off (first==last, span 0) NEVER trips it — unlike the
      # old `count>0 for:1h`, which fired on every one-off because the 24h recency window kept
      # the gauge non-zero (it measured state-retention, not network behavior). `for: 5m` is a
      # light debounce only; the >=1h recurrence is already encoded in the metric.
      - alert: EgressUnexpectedDestinationPersistent
        expr: egress_unexpected_destination_persistent > 0
        for: 5m
        labels:
          severity: critical
          category: security
          component: egress
        annotations:
          summary: "SUSTAINED unexpected egress from {{ $labels.service }}"
          description: "{{ $labels.service }} has connected to {{ $value }} non-allow-listed public destination(s) repeatedly across >=1h and is still active (ADR-030 P7) — a beaconing/exfiltration shape, not a transient one-off. Investigate `data/egress/anomalies.jsonl` (service={{ $labels.service }}) for possible exfiltration from a compromised image BEFORE re-baselining."

      # Warning: the collector daemon has stopped sampling (~30s cadence; 5m = ~10 misses).
      # A dead collector means egress is unobserved — the dead-metric lesson (PR #225).
      - alert: EgressCollectorStale
        expr: (time() - egress_collector_last_run_timestamp) > 300
        for: 10m
        labels:
          severity: warning
          category: security
          component: egress
        annotations:
          summary: "Egress collector not sampling"
          description: "egress-collector.service last sampled {{ $value | humanizeDuration }} ago (expected ~30s). Egress is unobserved. Check: `systemctl --user status egress-collector.service`."

      # Warning: the classifier timer has not run (~10m cadence; 1h = ~6 misses).
      - alert: EgressDetectorStale
        expr: (time() - egress_detector_last_run_timestamp) > 3600
        for: 30m
        labels:
          severity: warning
          category: security
          component: egress
        annotations:
          summary: "Egress classifier not running"
          description: "detect-egress-anomaly last ran {{ $value | humanizeDuration }} ago (expected ~10m). Check: `systemctl --user status egress-detect.timer`."

      # Warning: the egress metrics never appeared at all (producer never started /
      # textfile mount broken). Distinct from "went stale" — catches a never-wired pipe.
      - alert: EgressObservatoryAbsent
        expr: absent(egress_collector_last_run_timestamp)
        for: 30m
        labels:
          severity: warning
          category: security
          component: egress
        annotations:
          summary: "Egress observatory metrics absent"
          description: "No egress_collector_last_run_timestamp series exists. The collector never wrote a metric or the node_exporter textfile mount is broken (ADR-030 P7). Verify `data/backup-metrics/egress-collector.prom` and the node_exporter textfile collector."
