# egress-baseline.yaml — ADR-030 P7 (Tier 4) frozen-prefix egress allow-list.
#
# WHAT: the set of PUBLIC network destinations each egress-tier (reverse_proxy)
# service is expected to talk to. `scripts/detect-egress-anomaly.sh` classifies every
# observed public destination against this file; anything outside it is an anomaly.
#
# WHY frozen prefixes (operator decision 2026-05-24): a raw socket connection carries
# no domain/SNI, and CDN IPs rotate, so an IP-exact list false-positives constantly and
# a domain list is not derivable from the wire. We therefore classify by CIDR/owner
# prefixes captured at baseline time. This keeps the hot path a pure prefix-membership
# test — NO DNS/ASN/whois call at runtime, no external account, no boot-path dependency
# (fits the digital-sovereignty posture). Cost: re-baseline manually when a provider
# adds ranges (a flagged anomaly is the prompt). Generated/refreshed by
# `scripts/egress-baseline.sh` from the observed `data/egress/destinations.tsv`; this
# file is then HUMAN-REVIEWED (the deliberate checkpoint, ADR-030 P1) before arming.
#
# Classification for a (service, ip): EXPECTED if ip ∈ any CIDR in
#   (infrastructure ∪ services[service]); otherwise UNEXPECTED → metric + JSONL + alert.
#
# SEEDED 2026-06-11 from the 2026-05-24 → 2026-06-11 shadow window (18 days, 216
# observed destinations, 3 Sundays of weekly-cadence egress). Reviewed entry-by-entry
# before arming; vaultwarden moved to peer_swarm (see note). Re-baseline:
# scripts/egress-baseline.sh --write, review the .proposed.yaml, merge here.

# --- Peer-swarm services -----------------------------------------------------------
# Services whose LEGITIMATE egress is unbounded: per-destination allow-listing is
# meaningless. The detector tracks only the CONNECTION COUNT for these (a volume
# anomaly signal), never individual peers.
peer_swarm_services:
  - qbittorrent      # BitTorrent: ~130 concurrent peers on random IPs/ports (baseline 2026-05-24)
  - vaultwarden      # Favicon downloads: the server fetches icons DIRECTLY from every
                     # site in the vault (75 IPs / 19 owners in the baseline window,
                     # grows with the vault — EXPECTED behavior, user decision 2026-06-11:
                     # direct fetch keeps the domain list private vs leaking it to a
                     # central icon service; icons matter for managing a large vault).
                     # RESIDUAL RISK (accepted, documented): one quiet exfil connection
                     # is indistinguishable from an icon fetch at the socket level —
                     # only volume anomalies are detectable for this service.
                     # Compensating: vault E2E-encrypted at rest, YubiKey 2FA,
                     # CrowdSec + rate-limit in front.

# --- Shared infrastructure (applies to ALL classify-mode services) -----------------
# Deliberately EMPTY (review decision 2026-06-11): promoting broad CDN ranges
# (Cloudflare/Fastly) here would let ANY compromised service hide behind "everyone may
# reach any CDN" — much C2 infrastructure sits behind Cloudflare. Per-service entries
# below keep each allowance scoped to the service that demonstrated the need.
infrastructure: []

